name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          shellcheck --version
          shellcheck grab-links.sh plugin.tmux tests/run.sh

      - name: bash syntax check
        run: |
          bash -n grab-links.sh
          bash -n plugin.tmux
          bash -n tests/run.sh

      - name: run tests
        run: ./tests/run.sh
